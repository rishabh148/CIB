version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app
      # Add other environment variables here, e.g., OPENAI_API_KEY
    command: python /app/backend/main.py
    volumes:
      - ./backend:/app/backend
      - ./db.json:/app/db.json # Persist database
    # Optionally add restart policy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      PYTHONPATH: /app
      # Streamlit specific environment variables if needed
    command: streamlit run /app/frontend/app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - backend
    restart: unless-stopped
