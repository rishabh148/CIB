services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: backend
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    command: gunicorn --bind 0.0.0.0:8000 backend.main:app
    volumes:
      - ./backend/db.json:/app/backend/db.json
    # Optionally add restart policy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: frontend
    ports:
      - "8501:8501"
    environment:
      PYTHONPATH: /app
      API_URL: http://backend:8000/api
    command: streamlit run /app/frontend/app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - backend
    restart: unless-stopped
